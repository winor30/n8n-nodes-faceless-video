# Publishes to npm via OIDC trusted publishing.
# One-time setup on npmjs.com: package -> Settings -> Trusted publishing -> GitHub Actions
#   owner=winor30, repo=n8n-nodes-faceless-video, workflow=publish.yml, allowed action=npm publish
# Release by bumping the version and pushing a tag like `v0.1.2`.
name: Publish

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prepublishOnly
      - run: npm install -g npm@latest
      - run: npm publish --registry=https://registry.npmjs.org --access public --ignore-scripts --provenance
